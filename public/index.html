<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infoside HaaS — Portal de Equipamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f1f3f6; --surface:#ffffff; --surface2:#f7f9fc; --border:#dde1e8;
    --accent:#2563eb; --accent2:#0066ff; --warn:#e8590c;
    --text:#0a0c10; --muted:#3a3f4a; --online:#16a34a; --offline:#dc2626;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; }
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { width:380px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; box-shadow:0 4px 24px rgba(0,0,0,.06); }
  .login-logo { font-size:22px; font-weight:800; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .login-logo span { width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); }
  .login-sub { color:var(--muted); font-size:13px; margin-bottom:36px; font-family:'DM Mono',monospace; }
  .field-label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .field-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; margin-bottom:20px; outline:none; }
  .field-input:focus { border-color:var(--accent); }
  .btn-login { width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:13px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; }
  .login-error { color:var(--offline); font-size:13px; font-family:'DM Mono',monospace; margin-top:14px; text-align:center; display:none; }
  #app { display:none; min-height:100vh; }
  .topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-size:18px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .topbar-logo span { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 8px var(--accent); }
  .topbar-right { display:flex; align-items:center; gap:20px; }
  .user-badge { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; }
  .user-badge strong { color:var(--text); }
  .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:6px; font-family:'Syne',sans-serif; font-size:12px; font-weight:600; cursor:pointer; }
  .main { padding:32px 28px; max-width:1400px; margin:0 auto; }
  .stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 22px; }
  .stat-label { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:10px; }
  .stat-value { font-size:32px; font-weight:800; line-height:1; }
  .stat-value.green { color:var(--online); }
  .stat-value.blue { color:var(--accent2); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:16px; flex-wrap:wrap; }
  .section-title { font-size:18px; font-weight:700; }
  .toolbar-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .search-box, .group-filter { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; }
  .search-box { width:220px; }
  .search-box:focus, .group-filter:focus { border-color:var(--accent); }
  .btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 16px; border-radius:8px; font-family:'Syne',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { color:#fff; opacity:.9; }

  /* Tabela */
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .thead { display:grid; grid-template-columns:32px 1.6fr 1.3fr 1fr 1fr 90px; gap:12px; padding:12px 18px; border-bottom:1px solid var(--border); background:var(--surface2); font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .th-sort { cursor:pointer; user-select:none; display:flex; align-items:center; gap:4px; }
  .th-sort:hover { color:var(--accent); }
  .th-arrow { font-size:9px; opacity:.5; }
  .th-arrow.active { opacity:1; color:var(--accent); }
  .row { display:grid; grid-template-columns:32px 1.6fr 1.3fr 1fr 1fr 90px; gap:12px; padding:14px 18px; align-items:center; cursor:pointer; transition:background .12s; }
  .row:hover { background:var(--surface2); }
  .row.open { background:var(--surface2); }
  .toggle { width:22px; height:22px; border-radius:6px; background:#eef0f4; color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; transition:.15s; }
  .row.open .toggle { background:var(--accent); color:#fff; }
  .cell-name { font-size:14px; font-weight:600; color:var(--text); }
  .cell { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge { font-size:11px; font-weight:600; text-transform:uppercase; padding:3px 9px; border-radius:20px; background:rgba(22,163,74,.12); color:var(--online); }
  .row-group { border-bottom:1px solid #eef0f4; display:block; width:100%; }
  .details { padding:6px 18px 18px 62px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; box-sizing:border-box; }
  .det-key { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
  .det-val { font-size:13px; font-family:'DM Mono',monospace; color:var(--text); word-break:break-all; }
  .metric-bar-bg { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .metric-bar-fill { height:100%; border-radius:3px; background:var(--accent); }
  .metric-bar-fill.warn { background:var(--warn); }
  .metric-bar-fill.crit { background:var(--offline); }
  .loading-state, .empty-state { text-align:center; padding:80px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:14px; }
  .loading-spinner { display:inline-block; width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .last-update { font-size:12px; font-family:'DM Mono',monospace; color:var(--muted); margin-top:16px; text-align:right; }
  @media (max-width:768px){
    .stats-row{grid-template-columns:1fr;} .main{padding:20px 16px;}
    .thead{grid-template-columns:28px 1.4fr 1fr 70px;}
    .row{grid-template-columns:28px 1.4fr 1fr 70px;}
    .th-modelo,.cell-modelo,.th-serial,.cell-serial{display:none;}
    .details{grid-template-columns:1fr 1fr;padding-left:46px;}
  }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span></span> Infoside HaaS</div>
    <div class="login-sub">Portal de Monitoramento de Equipamentos</div>
    <div class="field-label">Usuário</div>
    <input class="field-input" type="text" id="inp-user" placeholder="seu.usuario">
    <div class="field-label">Senha</div>
    <input class="field-input" type="password" id="inp-pass" placeholder="••••••••">
    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="login-error" id="login-error">Usuário ou senha inválidos.</div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo"><span></span> Infoside HaaS</div>
    <div class="topbar-right">
      <div class="user-badge">Olá, <strong id="user-name">—</strong></div>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total de Equipamentos Ativos</div><div class="stat-value green" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Última Sincronização</div><div class="stat-value blue" id="stat-sync" style="font-size:18px;padding-top:6px">—</div></div>
    </div>
    <div class="toolbar">
      <div class="section-title">Equipamentos</div>
      <div class="toolbar-right">
        <select class="group-filter" id="group-filter" style="display:none"><option value="">Todos os grupos</option></select>
        <input class="search-box" id="search-box" type="text" placeholder="Buscar...">
        <button class="btn" id="btn-expand">Expandir todos</button>
        <button class="btn" id="btn-export">Exportar Excel</button>
        <button class="btn btn-primary" id="btn-refresh">↻ Atualizar</button>
      </div>
    </div>
    <div class="table-wrap">
      <div class="thead">
        <div></div>
        <div class="th-sort" data-sort="deviceName">Equipamento <span class="th-arrow" data-arrow="deviceName">▼</span></div>
        <div class="th-sort th-modelo" data-sort="systemModel">Modelo <span class="th-arrow" data-arrow="systemModel">▼</span></div>
        <div class="th-sort" data-sort="username">Usuário <span class="th-arrow" data-arrow="username">▼</span></div>
        <div class="th-sort th-serial" data-sort="serialNumber">Serial <span class="th-arrow" data-arrow="serialNumber">▼</span></div>
        <div style="text-align:center;">Status</div>
      </div>
      <div id="device-list">
        <div class="loading-state"><div class="loading-spinner"></div><br>Carregando equipamentos...</div>
      </div>
    </div>
    <div class="last-update" id="last-update"></div>
  </div>
</div>
<script>
let currentUser=null, allDevices=[], viewDevices=[], openSet=new Set(), allExpanded=false;
let sortKey='deviceName', sortDir=1;
const fmt=v=>(v==null||v==='')?'—':v;
function isOnline(d){return d.agentStatus==='A';}
function fmtIp(v){if(v==null)return'—';if(Array.isArray(v))v=v[0];v=String(v).trim();
  if(v.includes(','))v=v.split(',')[0].trim();if(v.includes(';'))v=v.split(';')[0].trim();
  if(v.includes(':'))return v;
  if(/^\d+$/.test(v)){const n=parseInt(v,10);if(n>255)return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}
  return v||'—';}
function osStr(d){const o=d.operatingSystem||{};const n=o.name||d.platformOSType||'';
  const v=o.version||o.releaseId||o.versionNumber||'';return[n,v].filter(Boolean).join(' ')||'—';}
function memPct(d){const t=d.totalPhysicalRamBytes,a=d.availablePhysicalRamBytes;
  if(!t||a==null)return null;return Math.round(((t-a)/t)*100);}
function gb(b){return(b/1073741824).toFixed(1);}
function barClass(p){return p>=90?'crit':p>=70?'warn':'';}
function devId(d){return d.deviceUid||d.esn||d.serialNumber||d.deviceName;}

function sortDevices(){
  viewDevices.sort((a,b)=>{
    let x=(a[sortKey]||'').toString().toLowerCase();
    let y=(b[sortKey]||'').toString().toLowerCase();
    if(x<y)return -1*sortDir; if(x>y)return 1*sortDir; return 0;
  });
}
function updateArrows(){
  document.querySelectorAll('[data-arrow]').forEach(el=>{
    const k=el.getAttribute('data-arrow');
    if(k===sortKey){el.classList.add('active');el.textContent=sortDir===1?'▲':'▼';}
    else{el.classList.remove('active');el.textContent='▼';}
  });
}
function render(){
  const box=document.getElementById('device-list');
  if(!viewDevices.length){box.innerHTML='<div class="empty-state">Nenhum equipamento encontrado.</div>';return;}
  box.innerHTML=viewDevices.map((d,idx)=>{
    const open=openSet.has(idx);
    const model=[d.systemManufacturer,d.systemModel].filter(Boolean).join(' ')||'—';
    const curUser=d.currentUsername||'';
    const showCur=curUser && curUser!==d.username;
    const mp=memPct(d);
    return `<div class="row-group">
      <div class="row ${open?'open':''}" data-idx="${idx}">
        <div class="toggle">${open?'−':'+'}</div>
        <div class="cell-name">${fmt(d.deviceName||d.fullSystemName)}</div>
        <div class="cell cell-modelo">${model}</div>
        <div class="cell">${fmt(d.username)}</div>
        <div class="cell cell-serial">${fmt(d.serialNumber||d.esn)}</div>
        <div style="text-align:center;"><span class="badge">Ativo</span></div>
      </div>
      ${open?`<div class="details">
        <div><div class="det-key">Nome completo</div><div class="det-val">${fmt(d.fullSystemName)}</div></div>
        ${showCur?`<div><div class="det-key">Usuário atual</div><div class="det-val">${curUser}</div></div>`:''}
        <div><div class="det-key">Domínio</div><div class="det-val">${fmt(d.domain)}</div></div>
        <div><div class="det-key">Sistema</div><div class="det-val">${osStr(d)}</div></div>
        <div><div class="det-key">IP Local</div><div class="det-val">${fmtIp(d.localIpAddress)}</div></div>
        <div><div class="det-key">IP Público</div><div class="det-val">${fmtIp(d.publicIpAddress)}</div></div>
        ${mp!==null?`<div><div class="det-key">Memória</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px;"><div class="metric-bar-bg"><div class="metric-bar-fill ${barClass(mp)}" style="width:${mp}%"></div></div><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);">${mp}%</span></div>
          <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:3px;">${gb(d.availablePhysicalRamBytes)} GB de ${gb(d.totalPhysicalRamBytes)} GB</div></div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
  box.querySelectorAll('.row').forEach(r=>{
    r.addEventListener('click',()=>{
      const idx=parseInt(r.getAttribute('data-idx'),10);
      if(openSet.has(idx))openSet.delete(idx);else openSet.add(idx);
      render();
    });
  });
}
function updateStats(){
  document.getElementById('stat-total').textContent=allDevices.length;
  document.getElementById('stat-sync').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-update').textContent='Última atualização: '+new Date().toLocaleString('pt-BR')+' · '+viewDevices.length+' exibidos';
}
function applySearch(){
  const q=document.getElementById('search-box').value.toLowerCase().trim();
  viewDevices=q?allDevices.filter(d=>JSON.stringify(d).toLowerCase().includes(q)):allDevices.slice();
  sortDevices();
  openSet.clear();
  allExpanded=false;
  document.getElementById('btn-expand').textContent='Expandir todos';
  updateStats();render();
}
async function loadDevices(group=''){
  const box=document.getElementById('device-list');
  box.innerHTML='<div class="loading-state"><div class="loading-spinner"></div><br>Carregando equipamentos...</div>';
  try{
    const url=group?'/api/devices?group='+encodeURIComponent(group):'/api/devices';
    const r=await fetch(url);
    if(r.status===401){showLogin();return;}
    const data=await r.json();
    if(data.error){box.innerHTML='<div class="empty-state">Erro: '+data.error+'</div>';return;}
    allDevices=data.devices||[];
    openSet.clear();allExpanded=false;
    document.getElementById('btn-expand').textContent='Expandir todos';
    if(currentUser&&currentUser.isAdmin){
      const groups=[...new Set(allDevices.map(d=>d.policyGroupName).filter(Boolean))].sort();
      document.getElementById('group-filter').innerHTML='<option value="">Todos os grupos</option>'+groups.map(g=>`<option value="${g}">${g}</option>`).join('');
    }
    applySearch();
  }catch(e){box.innerHTML='<div class="empty-state">Erro de conexão: '+e.message+'</div>';}
}
function exportCSV(){
  const cols=[['Equipamento','deviceName'],['Nome completo','fullSystemName'],['Modelo',null],['Serial','serialNumber'],['Usuário','username'],['Usuário atual','currentUsername'],['Domínio','domain'],['Sistema',null],['IP Local','localIpAddress'],['IP Público','publicIpAddress'],['Status','agentStatus']];
  const head=cols.map(c=>c[0]).join(';');
  const rows=viewDevices.map(d=>cols.map(c=>{
    let v;
    if(c[1]==='localIpAddress'||c[1]==='publicIpAddress')v=fmtIp(d[c[1]]);
    else if(c[0]==='Modelo')v=[d.systemManufacturer,d.systemModel].filter(Boolean).join(' ');
    else if(c[0]==='Sistema')v=osStr(d);
    else if(c[1]==='agentStatus')v='Ativo';
    else v=d[c[1]]||'';
    return '"'+String(v).replace(/"/g,'""')+'"';
  }).join(';')).join('\n');
  const csv='\uFEFF'+head+'\n'+rows;
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='equipamentos_infoside_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(u){currentUser=u;document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';document.getElementById('user-name').textContent=u.name;
  if(u.isAdmin)document.getElementById('group-filter').style.display='block';loadDevices();}
document.getElementById('btn-login').addEventListener('click',async()=>{
  const username=document.getElementById('inp-user').value.trim();
  const password=document.getElementById('inp-pass').value;
  const err=document.getElementById('login-error');err.style.display='none';
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await r.json();if(!r.ok){err.style.display='block';return;}showApp(data);});
document.getElementById('inp-pass').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
document.getElementById('btn-logout').addEventListener('click',async()=>{await fetch('/api/logout',{method:'POST'});showLogin();});
document.getElementById('btn-refresh').addEventListener('click',()=>loadDevices(document.getElementById('group-filter').value));
document.getElementById('search-box').addEventListener('input',applySearch);
document.getElementById('group-filter').addEventListener('change',e=>loadDevices(e.target.value));
document.getElementById('btn-export').addEventListener('click',exportCSV);
document.getElementById('btn-expand').addEventListener('click',()=>{
  allExpanded=!allExpanded;
  if(allExpanded){viewDevices.forEach((d,i)=>openSet.add(i));document.getElementById('btn-expand').textContent='Recolher todos';}
  else{openSet.clear();document.getElementById('btn-expand').textContent='Expandir todos';}
  render();
});
document.querySelectorAll('.th-sort').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.getAttribute('data-sort');
    if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}
    sortDevices();openSet.clear();allExpanded=false;
    document.getElementById('btn-expand').textContent='Expandir todos';
    updateArrows();render();
  });
});
updateArrows();
(async()=>{try{const r=await fetch('/api/me');if(r.ok){showApp(await r.json());}else showLogin();}catch{showLogin();}})();
</script>
</body>
</html>
