<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infoside HaaS — Portal de Equipamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f1f3f6; --surface:#ffffff; --surface2:#f7f9fc; --border:#dde1e8;
    --accent:#2563eb; --accent2:#0066ff; --warn:#e8590c;
    --text:#0a0c10; --muted:#3a3f4a; --online:#16a34a; --offline:#dc2626;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; }
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { width:380px; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:48px 40px; }
  .login-logo { font-size:22px; font-weight:800; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .login-logo span { width:10px; height:10px; background:var(--accent); border-radius:50%;
    box-shadow:0 0 12px var(--accent); }
  .login-sub { color:var(--muted); font-size:13px; margin-bottom:36px; font-family:'DM Mono',monospace; }
  .field-label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px; }
  .field-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
    padding:12px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px;
    margin-bottom:20px; outline:none; }
  .field-input:focus { border-color:var(--accent); }
  .btn-login { width:100%; background:var(--accent); color:#000; border:none; border-radius:8px;
    padding:13px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; }
  .login-error { color:var(--offline); font-size:13px; font-family:'DM Mono',monospace;
    margin-top:14px; text-align:center; display:none; }
  #app { display:none; min-height:100vh; }
  .topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; padding:0 28px;
    position:sticky; top:0; z-index:100; }
  .topbar-logo { font-size:18px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .topbar-logo span { width:8px; height:8px; background:var(--accent); border-radius:50%;
    box-shadow:0 0 8px var(--accent); }
  .topbar-right { display:flex; align-items:center; gap:20px; }
  .user-badge { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; }
  .user-badge strong { color:var(--text); }
  .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted);
    padding:6px 14px; border-radius:6px; font-family:'Syne',sans-serif; font-size:12px;
    font-weight:600; cursor:pointer; }
  .main { padding:32px 28px; max-width:1400px; margin:0 auto; }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 22px; }
  .stat-label { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted);
    font-weight:600; margin-bottom:10px; }
  .stat-value { font-size:32px; font-weight:800; line-height:1; }
  .stat-value.green { color:var(--accent); }
  .stat-value.red { color:var(--offline); }
  .stat-value.blue { color:var(--accent2); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:16px; flex-wrap:wrap; }
  .section-title { font-size:18px; font-weight:700; }
  .toolbar-right { display:flex; gap:10px; align-items:center; }
  .search-box, .group-filter { background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:9px 14px; color:var(--text); font-family:'DM Mono',monospace;
    font-size:13px; outline:none; }
  .search-box { width:220px; }
  .search-box:focus, .group-filter:focus { border-color:var(--accent); }
  .btn-refresh { background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:9px 16px; border-radius:8px; font-family:'Syne',sans-serif; font-size:13px;
    font-weight:600; cursor:pointer; }
  .device-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
  .device-card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:20px; position:relative; overflow:hidden; transition:border-color .2s,transform .2s; }
  .device-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:var(--accent); opacity:0; transition:opacity .2s; }
  .device-card.offline::before { background:var(--offline); }
  .device-card:hover { border-color:#2a3040; transform:translateY(-2px); }
  .device-card:hover::before { opacity:1; }
  .device-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
  .device-name { font-size:15px; font-weight:700; line-height:1.2; margin-bottom:3px; }
  .device-model { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
  .status-badge { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
    letter-spacing:.5px; text-transform:uppercase; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .status-badge.online { background:rgba(0,229,160,.1); color:var(--online); }
  .status-badge.offline { background:rgba(255,68,85,.1); color:var(--offline); }
  .status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
  .device-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }
  .device-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .info-item.full { grid-column:1/-1; }
  .info-key { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); margin-bottom:3px; }
  .info-val { font-size:13px; font-family:'DM Mono',monospace; color:var(--text); word-break:break-all; }
  .device-metrics { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  .metric-row { display:flex; align-items:center; gap:10px; }
  .metric-label { font-size:11px; font-weight:600; text-transform:uppercase; color:var(--muted);
    width:36px; flex-shrink:0; }
  .metric-bar-bg { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .metric-bar-fill { height:100%; border-radius:3px; background:var(--accent); transition:width .8s; }
  .metric-bar-fill.warn { background:var(--warn); }
  .metric-bar-fill.crit { background:var(--offline); }
  .metric-pct { font-size:12px; font-family:'DM Mono',monospace; color:var(--muted); width:36px; text-align:right; }
  .device-location { margin-top:12px; font-size:12px; font-family:'DM Mono',monospace;
    color:var(--muted); display:flex; align-items:center; gap:6px; }
  .location-link { color:var(--accent2); text-decoration:none; font-size:12px; }
  .loading-state, .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px;
    color:var(--muted); font-family:'DM Mono',monospace; font-size:14px; }
  .loading-spinner { display:inline-block; width:32px; height:32px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .last-update { font-size:12px; font-family:'DM Mono',monospace; color:var(--muted); margin-top:24px; text-align:right; }
  @media (max-width:768px){ .stats-row{grid-template-columns:repeat(2,1fr);} .device-grid{grid-template-columns:1fr;} .main{padding:20px 16px;} }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span></span> Infoside HaaS</div>
    <div class="login-sub">Portal de Monitoramento de Equipamentos</div>
    <div class="field-label">Usuário</div>
    <input class="field-input" type="text" id="inp-user" placeholder="seu.usuario">
    <div class="field-label">Senha</div>
    <input class="field-input" type="password" id="inp-pass" placeholder="••••••••">
    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="login-error" id="login-error">Usuário ou senha inválidos.</div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo"><span></span> Infoside HaaS</div>
    <div class="topbar-right">
      <div class="user-badge">Olá, <strong id="user-name">—</strong></div>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="stats-row" style="grid-template-columns:repeat(2,1fr);">
      <div class="stat-card"><div class="stat-label">Total de Equipamentos Ativos</div><div class="stat-value green" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Última Sincronização</div><div class="stat-value blue" id="stat-sync" style="font-size:18px;padding-top:6px">—</div></div>
    </div>
    <div class="toolbar">
      <div class="section-title">Equipamentos</div>
      <div class="toolbar-right">
        <select class="group-filter" id="group-filter" style="display:none"><option value="">Todos os grupos</option></select>
        <input class="search-box" id="search-box" type="text" placeholder="Buscar equipamento...">
        <button class="btn-refresh" id="btn-refresh">↻ Atualizar</button>
      </div>
    </div>
    <div class="device-grid" id="device-grid">
      <div class="loading-state"><div class="loading-spinner"></div><br>Carregando equipamentos...</div>
    </div>
    <div class="last-update" id="last-update"></div>
  </div>
</div>
<script>
let currentUser=null, allDevices=[];
const fmt=v=>v||'—';
function timeSince(d){if(!d)return'—';const s=(Date.now()-new Date(d))/1000;
  if(s<3600)return Math.floor(s/60)+'min atrás';if(s<86400)return Math.floor(s/3600)+'h atrás';
  return Math.floor(s/86400)+'d atrás';}
function isOnline(d){return d.agentStatus==='A';}
function memPct(d){const t=d.totalPhysicalRamBytes,a=d.availablePhysicalRamBytes;
  if(!t||a==null)return null;return Math.round(((t-a)/t)*100);}
function diskPct(d){if(!d.volumes||!d.volumes.length)return null;
  let tot=0,free=0;d.volumes.forEach(v=>{if(v.totalSpaceBytes){tot+=v.totalSpaceBytes;free+=(v.freeSpaceBytes||0);}});
  if(!tot)return null;return Math.round(((tot-free)/tot)*100);}
function barClass(p){return p>=90?'crit':p>=70?'warn':'';}
function metricBar(l,p){if(p===null)return'';return `<div class="metric-row"><div class="metric-label">${l}</div>
  <div class="metric-bar-bg"><div class="metric-bar-fill ${barClass(p)}" style="width:${p}%"></div></div>
  <div class="metric-pct">${p}%</div></div>`;}
function geoHTML(d){const g=d.geoData;if(!g)return'';
  const lat=g.latitude||(g.location&&g.location.point&&g.location.point.latitude);
  const lng=g.longitude||(g.location&&g.location.point&&g.location.point.longitude);
  const city=(g.city||(g.location&&g.location.city))||'';
  const country=(g.countryName||g.country||(g.location&&g.location.country))||'';
  const place=[city,country].filter(Boolean).join(', ');
  if(!lat||!lng)return place?`<div class="device-location">📍 ${place}</div>`:'';
  return `<div class="device-location">📍 <a class="location-link" href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">${place||lat.toFixed(3)+', '+lng.toFixed(3)}</a></div>`;}
function renderDevices(list){
  const grid=document.getElementById('device-grid');
  if(!list.length){grid.innerHTML='<div class="empty-state">Nenhum equipamento encontrado.</div>';return;}
  document.getElementById('stat-total').textContent=list.length;
  document.getElementById('stat-sync').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-update').textContent='Última atualização: '+new Date().toLocaleString('pt-BR');
  grid.innerHTML=list.map((d,i)=>{
    const on_=isOnline(d),mp=memPct(d);
    const model=[d.systemManufacturer,d.systemModel].filter(Boolean).join(' ')||'—';
    const osObj=d.operatingSystem||{};
    const osName=osObj.name||d.platformOSType||'';
    const osVer=osObj.version||osObj.releaseId||osObj.versionNumber||'';
    const os=[osName,osVer].filter(Boolean).join(' ')||'—';
    const user=d.username||'—';
    const curUser=d.currentUsername||'';
    const showCur=curUser && curUser!==d.username;
    return `<div class="device-card ${on_?'':'offline'}">
      <div class="device-header"><div>
        <div class="device-name">${fmt(d.deviceName||d.fullSystemName)}</div>
        <div class="device-model">${model}</div></div>
        <div class="status-badge ${on_?'online':'offline'}"><div class="status-dot"></div>${on_?'Ativo':'Inativo'}</div>
      </div><hr class="device-divider">
      <div class="device-info-grid">
        <div class="info-item full"><div class="info-key">Nome completo</div><div class="info-val">${fmt(d.fullSystemName)}</div></div>
        <div class="info-item"><div class="info-key">Serial</div><div class="info-val">${fmt(d.serialNumber||d.esn)}</div></div>
        <div class="info-item"><div class="info-key">Usuário</div><div class="info-val">${user}</div></div>
        ${showCur?`<div class="info-item"><div class="info-key">Usuário atual</div><div class="info-val">${curUser}</div></div>`:''}
        <div class="info-item"><div class="info-key">Domínio</div><div class="info-val">${fmt(d.domain)}</div></div>
        <div class="info-item full"><div class="info-key">Sistema</div><div class="info-val">${os}</div></div>
        ${d.localIpAddress?`<div class="info-item"><div class="info-key">IP Local</div><div class="info-val">${fmtIp(d.localIpAddress)}</div></div>`:''}
        ${d.publicIpAddress?`<div class="info-item"><div class="info-key">IP Público</div><div class="info-val">${fmtIp(d.publicIpAddress)}</div></div>`:''}
      </div>
      ${(mp!==null)?`<hr class="device-divider"><div class="device-metrics">${metricBar('MEM',mp)}${memText(d)}</div>`:''}
      ${geoHTML(d)}
    </div>`;}).join('');
}
function memText(d){const t=d.totalPhysicalRamBytes,a=d.availablePhysicalRamBytes;
  if(!t||a==null)return'';const gb=b=>(b/1073741824).toFixed(1);
  return `<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);padding-left:50px;">${gb(a)} GB livres de ${gb(t)} GB</div>`;}
function fmtIp(v){if(v==null)return'—';
  if(Array.isArray(v))v=v[0];
  v=String(v).trim();
  if(v.includes(','))v=v.split(',')[0].trim();
  if(v.includes(';'))v=v.split(';')[0].trim();
  if(v.includes(':'))return v;
  if(/^\d+$/.test(v)){const n=parseInt(v,10);
    if(n>255){return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}}
  return v||'—';}
function applySearch(){const q=document.getElementById('search-box').value.toLowerCase();
  const f=q?allDevices.filter(d=>JSON.stringify(d).toLowerCase().includes(q)):allDevices;
  renderDevices(f);}
async function loadDevices(group=''){
  const grid=document.getElementById('device-grid');
  grid.innerHTML='<div class="loading-state"><div class="loading-spinner"></div><br>Carregando equipamentos...</div>';
  try{
    const url=group?'/api/devices?group='+encodeURIComponent(group):'/api/devices';
    const r=await fetch(url);
    if(r.status===401){showLogin();return;}
    const data=await r.json();
    if(data.error){grid.innerHTML='<div class="empty-state">Erro: '+data.error+'</div>';return;}
    allDevices=data.devices||[];
    applySearch();
    if(currentUser&&currentUser.isAdmin){
      const groups=[...new Set(allDevices.map(d=>d.policyGroupName).filter(Boolean))].sort();
      document.getElementById('group-filter').innerHTML='<option value="">Todos os grupos</option>'+
        groups.map(g=>`<option value="${g}">${g}</option>`).join('');
    }
  }catch(e){grid.innerHTML='<div class="empty-state">Erro de conexão: '+e.message+'</div>';}
}
function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(u){currentUser=u;document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';document.getElementById('user-name').textContent=u.name;
  if(u.isAdmin)document.getElementById('group-filter').style.display='block';loadDevices();}
document.getElementById('btn-login').addEventListener('click',async()=>{
  const username=document.getElementById('inp-user').value.trim();
  const password=document.getElementById('inp-pass').value;
  const err=document.getElementById('login-error');err.style.display='none';
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})});
  const data=await r.json();if(!r.ok){err.style.display='block';return;}showApp(data);});
document.getElementById('inp-pass').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
document.getElementById('btn-logout').addEventListener('click',async()=>{await fetch('/api/logout',{method:'POST'});showLogin();});
document.getElementById('btn-refresh').addEventListener('click',()=>loadDevices(document.getElementById('group-filter').value));
document.getElementById('search-box').addEventListener('input',applySearch);
document.getElementById('group-filter').addEventListener('change',e=>loadDevices(e.target.value));
(async()=>{try{const r=await fetch('/api/me');if(r.ok){showApp(await r.json());}else showLogin();}catch{showLogin();}})();
</script>
</body>
</html>
